name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/ci-learning
          npm test 2>&1 | tee artifacts/ci-learning/test-output.log

      - name: Summarize failed test run
        if: failure()
        run: |
          node scripts/ci/collect-test-failure.mjs \
            --input artifacts/ci-learning/test-output.log \
            --outdir artifacts/ci-learning \
            --command "npm test"

      - name: Upload CI learning artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-learning
          path: artifacts/ci-learning
