name: Promote CI Learning

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: GitHub Actions run id containing the ci-learning artifact
        required: true
        type: string
      artifact_name:
        description: Artifact name to download
        required: false
        default: ci-learning
        type: string
      title_override:
        description: Optional note title override
        required: false
        type: string
      extra_tags:
        description: Optional comma-separated extra tags
        required: false
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download CI learning artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts/source
          gh run download "${{ inputs.run_id }}" \
            --name "${{ inputs.artifact_name }}" \
            --dir artifacts/source

      - name: Promote artifact through MCP
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          node scripts/ci/promote-learning.mjs \
            --artifact-dir artifacts/source \
            --cwd "$GITHUB_WORKSPACE" \
            --title-override "${{ inputs.title_override }}" \
            --extra-tags "${{ inputs.extra_tags }}"
