name: Publish Package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish-release:
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: read
      id-token: write  # Required for npm OIDC trusted publishing

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest  # Requires npm >= 11.5.1

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "$TAG_NAME" != "v$PACKAGE_VERSION" ]; then
            echo "Tag $TAG_NAME does not match package version v$PACKAGE_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish  # Provenance attestation is automatic via OIDC trusted publishing
